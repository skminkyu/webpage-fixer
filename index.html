<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상세페이지 검토 시스템</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; }
    header span { font-size: .8rem; color: #a0aec0; }

    /* ── Toolbar ── */
    #toolbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #toolbar label { font-size: .82rem; color: #555; font-weight: 600; }
    .color-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active { border-color: #1a1a2e; transform: scale(1.2); }
    .sep { width: 1px; height: 28px; background: #e2e8f0; margin: 0 4px; }
    .tool-btn {
      padding: 6px 14px;
      border: 1px solid #cbd5e0;
      background: #fff;
      border-radius: 6px;
      font-size: .82rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      font-family: inherit;
    }
    .tool-btn:hover { background: #edf2f7; border-color: #a0aec0; }
    .tool-btn.primary {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }
    .tool-btn.primary:hover { background: #2d2d4e; }

    /* ── Main ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Canvas area ── */
    #canvas-area {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
      padding: 24px;
      background: #e8ecf0;
    }

    #image-wrapper {
      position: relative;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,.18);
      border-radius: 4px;
      overflow: hidden;
      line-height: 0;
      cursor: crosshair;
    }
    #image-wrapper.no-image { display: none; }

    #bg-image {
      display: block;
      max-width: 100%;
      user-select: none;
      pointer-events: none;
    }

    #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Upload placeholder ── */
    #upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 2.5px dashed #a0aec0;
      border-radius: 12px;
      padding: 60px 80px;
      background: #fff;
      color: #718096;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      min-width: 380px;
    }
    #upload-placeholder:hover, #upload-placeholder.drag-over {
      border-color: #1a1a2e;
      background: #f7f8ff;
    }
    #upload-placeholder svg { opacity: .5; }
    #upload-placeholder p { font-size: .95rem; }
    #upload-placeholder small { font-size: .78rem; color: #a0aec0; }
    #file-input { display: none; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 260px;
      background: #f8f9fa;
      border-left: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      font-size: .88rem;
      font-weight: 700;
      color: #2d3748;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #annotation-count {
      font-size: .78rem;
      color: #718096;
      font-weight: 400;
    }
    #comment-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #comment-list:empty::after {
      content: '주석이 없습니다.\n이미지에 박스를 그려 주세요.';
      white-space: pre;
      display: block;
      text-align: center;
      color: #a0aec0;
      font-size: .82rem;
      margin-top: 40px;
      line-height: 1.8;
    }

    .comment-card {
      background: #fff;
      border-radius: 8px;
      border-left: 4px solid #ccc;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      transition: box-shadow .15s, transform .15s;
      cursor: pointer;
    }
    .comment-card:hover, .comment-card.highlighted {
      box-shadow: 0 3px 12px rgba(0,0,0,.13);
      transform: translateX(2px);
    }
    .comment-card.highlighted { background: #fffbe6; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #1a1a2e;
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-label { font-size: .82rem; font-weight: 600; color: #2d3748; flex: 1; }
    .card-delete {
      background: none;
      border: none;
      color: #a0aec0;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      transition: color .15s;
    }
    .card-delete:hover { color: #e53e3e; }
    .card-textarea {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 6px 8px;
      font-size: .8rem;
      font-family: inherit;
      resize: vertical;
      min-height: 58px;
      color: #4a5568;
      transition: border-color .15s;
    }
    .card-textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .card-textarea::placeholder { color: #cbd5e0; }
  </style>
</head>
<body>

<header>
  <h1>🖼 상세페이지 검토 시스템</h1>
  <span>이미지에 주석을 달고 의견을 기록하세요</span>
</header>

<div id="toolbar">
  <label>색상:</label>
  <button class="color-btn active" data-color="#e53e3e" style="background:#e53e3e" title="빨간색"></button>
  <button class="color-btn" data-color="#f6ad55" style="background:#f6ad55" title="노란색"></button>
  <button class="color-btn" data-color="#4299e1" style="background:#4299e1" title="파란색"></button>
  <button class="color-btn" data-color="#48bb78" style="background:#48bb78" title="초록색"></button>
  <div class="sep"></div>
  <button class="tool-btn" id="btn-reset">초기화</button>
  <button class="tool-btn primary" id="btn-export">내보내기</button>
</div>

<div id="main">
  <div id="canvas-area">
    <input type="file" id="file-input" accept="image/*" />
    <div id="upload-placeholder" title="클릭하거나 이미지를 드래그하세요">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>이미지를 클릭하거나 드래그하여 업로드</p>
      <small>PNG, JPG, WebP 지원</small>
    </div>
    <div id="image-wrapper" class="no-image">
      <img id="bg-image" src="" alt="상세페이지" draggable="false" />
      <canvas id="draw-canvas"></canvas>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      주석 목록
      <span id="annotation-count">0개</span>
    </div>
    <div id="comment-list"></div>
  </div>
</div>

<script>
(() => {
  /* ── State ── */
  let annotations = [];
  let nextId = 1;
  let nextNumber = 1;
  let currentColor = '#e53e3e';
  let isDrawing = false;
  let startX = 0, startY = 0;
  let previewBox = null;  // {x,y,w,h}
  let hoveredId = null;
  let originalImage = null; // HTMLImageElement at natural size

  /* ── DOM refs ── */
  const fileInput      = document.getElementById('file-input');
  const uploadPlaceholder = document.getElementById('upload-placeholder');
  const imageWrapper   = document.getElementById('image-wrapper');
  const bgImage        = document.getElementById('bg-image');
  const drawCanvas     = document.getElementById('draw-canvas');
  const ctx            = drawCanvas.getContext('2d');
  const commentList    = document.getElementById('comment-list');
  const annotCount     = document.getElementById('annotation-count');
  const btnReset       = document.getElementById('btn-reset');
  const btnExport      = document.getElementById('btn-export');
  const colorBtns      = document.querySelectorAll('.color-btn');

  /* ── Color picker ── */
  colorBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      colorBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentColor = btn.dataset.color;
    });
  });

  /* ── File upload ── */
  uploadPlaceholder.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  // Drag & drop on placeholder
  uploadPlaceholder.addEventListener('dragover', e => {
    e.preventDefault();
    uploadPlaceholder.classList.add('drag-over');
  });
  uploadPlaceholder.addEventListener('dragleave', () => uploadPlaceholder.classList.remove('drag-over'));
  uploadPlaceholder.addEventListener('drop', e => {
    e.preventDefault();
    uploadPlaceholder.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
  });

  // Also allow drop on main canvas area when image already loaded
  document.getElementById('canvas-area').addEventListener('dragover', e => e.preventDefault());
  document.getElementById('canvas-area').addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
  });

  function loadImage(file) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      bgImage.src = url;
      bgImage.onload = () => {
        uploadPlaceholder.style.display = 'none';
        imageWrapper.classList.remove('no-image');
        syncCanvasSize();
        render();
      };
    };
    img.src = url;
  }

  /* ── Sync canvas size to rendered image ── */
  function syncCanvasSize() {
    const rect = bgImage.getBoundingClientRect();
    drawCanvas.width  = bgImage.offsetWidth;
    drawCanvas.height = bgImage.offsetHeight;
  }

  window.addEventListener('resize', () => {
    if (!originalImage) return;
    syncCanvasSize();
    render();
  });

  /* ── Drawing ── */
  function getPos(e) {
    const rect = drawCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  drawCanvas.addEventListener('mousedown', e => {
    if (!originalImage) return;
    const pos = getPos(e);
    isDrawing = true;
    startX = pos.x;
    startY = pos.y;
    previewBox = null;
  });

  drawCanvas.addEventListener('mousemove', e => {
    if (!originalImage) return;
    const pos = getPos(e);

    if (isDrawing) {
      previewBox = {
        x: Math.min(startX, pos.x),
        y: Math.min(startY, pos.y),
        w: Math.abs(pos.x - startX),
        h: Math.abs(pos.y - startY)
      };
      render();
      return;
    }

    // Check hover
    const cw = drawCanvas.width;
    const ch = drawCanvas.height;
    let found = null;
    for (let i = annotations.length - 1; i >= 0; i--) {
      const a = annotations[i];
      const rx = a.x * cw, ry = a.y * ch, rw = a.width * cw, rh = a.height * ch;
      if (pos.x >= rx && pos.x <= rx + rw && pos.y >= ry && pos.y <= ry + rh) {
        found = a.id;
        break;
      }
    }
    if (found !== hoveredId) {
      hoveredId = found;
      render();
      updateSidebarHover();
    }
  });

  drawCanvas.addEventListener('mouseup', e => {
    if (!isDrawing) return;
    isDrawing = false;
    const pos = getPos(e);
    const w = Math.abs(pos.x - startX);
    const h = Math.abs(pos.y - startY);
    previewBox = null;

    if (w < 8 || h < 8) { render(); return; } // too small

    const cw = drawCanvas.width;
    const ch = drawCanvas.height;

    const annot = {
      id: nextId++,
      number: nextNumber++,
      color: currentColor,
      comment: '',
      x: Math.min(startX, pos.x) / cw,
      y: Math.min(startY, pos.y) / ch,
      width:  w / cw,
      height: h / ch,
    };

    annotations.push(annot);
    render();
    buildSidebar();
    // Focus new card textarea
    setTimeout(() => {
      const ta = document.querySelector(`[data-id="${annot.id}"] .card-textarea`);
      if (ta) {
        ta.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        ta.focus();
      }
    }, 60);
  });

  drawCanvas.addEventListener('mouseleave', () => {
    if (hoveredId !== null) { hoveredId = null; render(); updateSidebarHover(); }
  });

  /* ── Render canvas ── */
  function render() {
    const cw = drawCanvas.width;
    const ch = drawCanvas.height;
    ctx.clearRect(0, 0, cw, ch);

    annotations.forEach(a => {
      drawBox(ctx, a, cw, ch, a.id === hoveredId);
    });

    // Preview
    if (isDrawing && previewBox) {
      ctx.save();
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 4]);
      ctx.globalAlpha = .7;
      ctx.strokeRect(previewBox.x, previewBox.y, previewBox.w, previewBox.h);
      ctx.fillStyle = currentColor;
      ctx.globalAlpha = .08;
      ctx.fillRect(previewBox.x, previewBox.y, previewBox.w, previewBox.h);
      ctx.restore();
    }
  }

  function drawBox(c, a, cw, ch, highlighted) {
    const rx = a.x * cw, ry = a.y * ch, rw = a.width * cw, rh = a.height * ch;
    c.save();

    // Fill
    c.fillStyle = a.color;
    c.globalAlpha = highlighted ? 0.18 : 0.10;
    c.fillRect(rx, ry, rw, rh);

    // Border
    c.globalAlpha = 1;
    c.strokeStyle = a.color;
    c.lineWidth = highlighted ? 3 : 2;
    c.setLineDash([]);
    c.strokeRect(rx, ry, rw, rh);

    // Number badge
    const bSize = 20;
    const bx = rx + 2;
    const by = ry - bSize - 2 < 0 ? ry + 2 : ry - bSize - 2;
    c.fillStyle = a.color;
    c.globalAlpha = 1;
    c.beginPath();
    c.roundRect(bx, by, bSize, bSize, 4);
    c.fill();
    c.fillStyle = '#fff';
    c.font = `bold ${bSize * 0.6}px sans-serif`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(String(a.number), bx + bSize / 2, by + bSize / 2);

    c.restore();
  }

  /* ── Sidebar ── */
  function buildSidebar() {
    commentList.innerHTML = '';
    annotations.forEach(a => {
      const card = document.createElement('div');
      card.className = 'comment-card';
      card.dataset.id = a.id;
      card.style.borderLeftColor = a.color;
      if (a.id === hoveredId) card.classList.add('highlighted');

      card.innerHTML = `
        <div class="card-top">
          <div class="card-num">${a.number}</div>
          <div class="card-color-dot" style="background:${a.color}"></div>
          <div class="card-label">주석 #${a.number}</div>
          <button class="card-delete" data-id="${a.id}" title="삭제">✕</button>
        </div>
        <textarea class="card-textarea" placeholder="의견을 입력하세요..." data-id="${a.id}">${a.comment}</textarea>
      `;

      // Hover
      card.addEventListener('mouseenter', () => {
        hoveredId = a.id;
        render();
        updateSidebarHover();
      });
      card.addEventListener('mouseleave', () => {
        hoveredId = null;
        render();
        updateSidebarHover();
      });

      // Delete
      card.querySelector('.card-delete').addEventListener('click', e => {
        e.stopPropagation();
        deleteAnnotation(a.id);
      });

      // Comment input
      card.querySelector('.card-textarea').addEventListener('input', e => {
        const ann = annotations.find(x => x.id === a.id);
        if (ann) ann.comment = e.target.value;
      });

      commentList.appendChild(card);
    });

    annotCount.textContent = `${annotations.length}개`;
  }

  function updateSidebarHover() {
    document.querySelectorAll('.comment-card').forEach(card => {
      card.classList.toggle('highlighted', Number(card.dataset.id) === hoveredId);
    });
  }

  function deleteAnnotation(id) {
    annotations = annotations.filter(a => a.id !== id);
    render();
    buildSidebar();
  }

  /* ── Reset ── */
  btnReset.addEventListener('click', () => {
    if (!annotations.length && !originalImage) return;
    if (!confirm('모든 주석을 초기화할까요?')) return;
    annotations = [];
    nextId = 1;
    nextNumber = 1;
    render();
    buildSidebar();
  });

  /* ── Export ── */
  btnExport.addEventListener('click', () => {
    if (!originalImage) { alert('먼저 이미지를 업로드해 주세요.'); return; }

    const iw = originalImage.naturalWidth;
    const ih = originalImage.naturalHeight;
    const offscreen = document.createElement('canvas');
    offscreen.width = iw;
    offscreen.height = ih;
    const oc = offscreen.getContext('2d');

    oc.drawImage(originalImage, 0, 0, iw, ih);

    annotations.forEach(a => drawBox(oc, a, iw, ih, false));

    offscreen.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `주석_${Date.now()}.png`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
})();
</script>
</body>
</html>
